<svg xmlns="http://www.w3.org/2000/svg" width="680" height="610" viewBox="0 0 680 610" role="img">
<title>Структура демо MVVM</title>
<desc>Страница создаёт PageVm и кладёт его в контекст, TitleDialog читает его из контекста, PageVm владеет TodosStore, который создаёт массив TodoModel.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.arr{stroke:#5f5e5a;stroke-width:1.5px;fill:none}.leader{stroke:#b4b2a9;stroke-width:.5px;stroke-dasharray:2 2;fill:none}
.c-purple>rect{fill:#eeedfe;stroke:#534ab7;stroke-width:.5px}.c-purple>.th,.c-purple>.t{fill:#3c3489}.c-purple>.ts{fill:#534ab7}
.c-teal>rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:.5px}.c-teal>.th,.c-teal>.t{fill:#085041}.c-teal>.ts{fill:#0f6e56}
.c-coral>rect{fill:#faece7;stroke:#993c1d;stroke-width:.5px}.c-coral>.th,.c-coral>.t{fill:#712b13}.c-coral>.ts{fill:#993c1d}
.c-gray>rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:.5px}.c-gray>.th,.c-gray>.t{fill:#444441}.c-gray>.ts{fill:#5f5e5a}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="610" fill="#ffffff"/>
<g class="c-purple">
<rect x="60" y="50" width="250" height="72" rx="4"/>
<text class="th" x="185" y="70" text-anchor="middle" dominant-baseline="central">+page.svelte</text>
<text class="ts" x="185" y="90" text-anchor="middle" dominant-baseline="central">new PageVm() · setPageVm(vm)</text>
<text class="ts" x="185" y="106" text-anchor="middle" dominant-baseline="central">onMount: init() / dispose()</text>
</g>
<g class="c-purple">
<rect x="370" y="50" width="250" height="72" rx="4"/>
<text class="th" x="495" y="70" text-anchor="middle" dominant-baseline="central">TitleDialog.svelte</text>
<text class="ts" x="495" y="90" text-anchor="middle" dominant-baseline="central">vm = getPageVm()</text>
<text class="ts" x="495" y="106" text-anchor="middle" dominant-baseline="central">bind:open · bind:value</text>
</g>
<line class="arr" x1="185" y1="122" x2="185" y2="176" marker-end="url(#arrow)"/>
<line class="arr" x1="455" y1="122" x2="455" y2="176" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
<g class="c-teal">
<rect x="150" y="182" width="340" height="88" rx="4"/>
<text class="th" x="320" y="204" text-anchor="middle" dominant-baseline="central">PageVm</text>
<text class="ts" x="320" y="228" text-anchor="middle" dominant-baseline="central">$state: pageTitle, filter, isTitleEditMode</text>
<text class="ts" x="320" y="246" text-anchor="middle" dominant-baseline="central">$derived: filteredTodos, isReady</text>
</g>
<g class="c-gray">
<rect x="510" y="196" width="130" height="60" rx="4"/>
<text class="th" x="575" y="216" text-anchor="middle" dominant-baseline="central">$effect.root</text>
<text class="ts" x="575" y="238" text-anchor="middle" dominant-baseline="central">ручной dispose</text>
</g>
<line class="arr" x1="490" y1="226" x2="504" y2="226" marker-end="url(#arrow)"/>
<line class="arr" x1="320" y1="270" x2="320" y2="324" marker-end="url(#arrow)"/>
<g class="c-coral">
<rect x="150" y="330" width="340" height="72" rx="4"/>
<text class="th" x="320" y="350" text-anchor="middle" dominant-baseline="central">TodosStore</text>
<text class="ts" x="320" y="370" text-anchor="middle" dominant-baseline="central">todos: $state.raw · fetchStatus: $state</text>
<text class="ts" x="320" y="386" text-anchor="middle" dominant-baseline="central">loadTodos() — async fetch</text>
</g>
<line class="arr" x1="320" y1="402" x2="320" y2="456" marker-end="url(#arrow)"/>
<g class="c-coral">
<rect x="150" y="462" width="340" height="72" rx="4"/>
<text class="th" x="320" y="482" text-anchor="middle" dominant-baseline="central">TodoModel[]</text>
<text class="ts" x="320" y="502" text-anchor="middle" dominant-baseline="central">$state: title, completed</text>
<text class="ts" x="320" y="518" text-anchor="middle" dominant-baseline="central">isDirty — сравнение с initialTitle</text>
</g>
<g class="c-purple"><rect x="60" y="554" width="12" height="12" rx="2"/></g>
<text class="ts" x="80" y="560" dominant-baseline="central">view</text>
<g class="c-teal"><rect x="140" y="554" width="12" height="12" rx="2"/></g>
<text class="ts" x="160" y="560" dominant-baseline="central">viewmodel</text>
<g class="c-coral"><rect x="250" y="554" width="12" height="12" rx="2"/></g>
<text class="ts" x="270" y="560" dominant-baseline="central">model</text>
<g class="c-gray"><rect x="340" y="554" width="12" height="12" rx="2"/></g>
<text class="ts" x="360" y="560" dominant-baseline="central">инфраструктура</text>
<text class="ts" x="60" y="586" dominant-baseline="central">пунктирная стрелка — чтение из контекста, сплошная — создание / владение</text>
</svg>
