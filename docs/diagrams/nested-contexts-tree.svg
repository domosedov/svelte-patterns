<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520" role="img">
<title>Вложенные провайдеры контекста</title>
<desc>Три вложенных VmProvider, каждая панель читает ближайший провайдер вверх по дереву, соседняя панель под внешним провайдером разделяет его инстанс.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.c-purple>rect{fill:#eeedfe;stroke:#534ab7;stroke-width:.5px}.c-purple>.th,.c-purple>.t{fill:#3c3489}.c-purple>.ts{fill:#534ab7}
.c-teal>rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:.5px}.c-teal>.th,.c-teal>.t{fill:#085041}.c-teal>.ts{fill:#0f6e56}
.c-pink>rect{fill:#fbeaf0;stroke:#993556;stroke-width:.5px}.c-pink>.th,.c-pink>.t{fill:#72243e}.c-pink>.ts{fill:#993556}
</style>
<rect width="680" height="520" fill="#ffffff"/>
<g class="c-purple">
<rect x="50" y="60" width="580" height="426" rx="4" stroke-dasharray="6 4"/>
<text class="th" x="66" y="84" dominant-baseline="central">VmProvider — контекст «внешний»</text>
</g>
<g class="c-purple">
<rect x="80" y="104" width="260" height="48" rx="4"/>
<text class="th" x="210" y="121" text-anchor="middle" dominant-baseline="central">Внешняя секция</text>
<text class="ts" x="210" y="140" text-anchor="middle" dominant-baseline="central">getSection() → «внешний»</text>
</g>
<g class="c-teal">
<rect x="80" y="178" width="520" height="220" rx="4" stroke-dasharray="6 4"/>
<text class="th" x="96" y="202" dominant-baseline="central">VmProvider — контекст «вложенный»</text>
</g>
<g class="c-teal">
<rect x="110" y="222" width="280" height="48" rx="4"/>
<text class="th" x="250" y="239" text-anchor="middle" dominant-baseline="central">Вложенная секция</text>
<text class="ts" x="250" y="258" text-anchor="middle" dominant-baseline="central">getSection() → «вложенный»</text>
</g>
<g class="c-pink">
<rect x="110" y="296" width="460" height="92" rx="4" stroke-dasharray="6 4"/>
<text class="th" x="126" y="318" dominant-baseline="central">VmProvider — контекст «глубокий»</text>
</g>
<g class="c-pink">
<rect x="140" y="330" width="280" height="48" rx="4"/>
<text class="th" x="280" y="347" text-anchor="middle" dominant-baseline="central">Глубокая секция</text>
<text class="ts" x="280" y="366" text-anchor="middle" dominant-baseline="central">getSection() → «глубокий»</text>
</g>
<g class="c-purple">
<rect x="80" y="418" width="300" height="48" rx="4"/>
<text class="th" x="230" y="435" text-anchor="middle" dominant-baseline="central">Соседняя панель</text>
<text class="ts" x="230" y="454" text-anchor="middle" dominant-baseline="central">getSection() → «внешний»</text>
</g>
<text class="ts" x="60" y="504" dominant-baseline="central">пунктирная рамка — VmProvider, сплошная — потребитель; цвет = чей контекст виден</text>
</svg>
