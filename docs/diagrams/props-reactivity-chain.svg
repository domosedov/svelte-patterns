<svg xmlns="http://www.w3.org/2000/svg" width="680" height="530" viewBox="0 0 680 530" role="img">
<title>Цепочка реактивности пропсов</title>
<desc>Состояние step из страницы проходит через реактивный проп, thunk и Proxy liveProps до чтения this.props.step внутри CounterVm, оставаясь актуальным.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.arr{stroke:#5f5e5a;stroke-width:1.5px;fill:none}.leader{stroke:#b4b2a9;stroke-width:.5px;stroke-dasharray:2 2;fill:none}
.c-purple>rect{fill:#eeedfe;stroke:#534ab7;stroke-width:.5px}.c-purple>.th,.c-purple>.t{fill:#3c3489}.c-purple>.ts{fill:#534ab7}
.c-teal>rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:.5px}.c-teal>.th,.c-teal>.t{fill:#085041}.c-teal>.ts{fill:#0f6e56}
.c-gray>rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:.5px}.c-gray>.th,.c-gray>.t{fill:#444441}.c-gray>.ts{fill:#5f5e5a}
.c-red>rect{fill:#fcebeb;stroke:#a32d2d;stroke-width:.5px}.c-red>.th,.c-red>.t{fill:#791f1f}.c-red>.ts{fill:#a32d2d}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="530" fill="#ffffff"/>
<g class="c-purple">
<rect x="180" y="50" width="320" height="56" rx="4"/>
<text class="th" x="340" y="70" text-anchor="middle" dominant-baseline="central">let step = $state(1)</text>
<text class="ts" x="340" y="90" text-anchor="middle" dominant-baseline="central">+page.svelte</text>
</g>
<line class="arr" x1="340" y1="106" x2="340" y2="136" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="180" y="142" width="320" height="56" rx="4"/>
<text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central">&lt;Counter {step} /&gt;</text>
<text class="ts" x="340" y="182" text-anchor="middle" dominant-baseline="central">проп остаётся реактивным</text>
</g>
<line class="arr" x1="340" y1="198" x2="340" y2="228" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="180" y="234" width="320" height="56" rx="4"/>
<text class="th" x="340" y="254" text-anchor="middle" dominant-baseline="central">() =&gt; ({ step: props.step })</text>
<text class="ts" x="340" y="274" text-anchor="middle" dominant-baseline="central">thunk — читается лениво</text>
</g>
<line class="leader" x1="500" y1="262" x2="508" y2="262"/>
<g class="c-red">
<rect x="510" y="234" width="130" height="56" rx="4"/>
<text class="th" x="575" y="254" text-anchor="middle" dominant-baseline="central">снимок</text>
<text class="ts" x="575" y="274" text-anchor="middle" dominant-baseline="central">step застывает</text>
</g>
<line class="arr" x1="340" y1="290" x2="340" y2="320" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="180" y="326" width="320" height="56" rx="4"/>
<text class="th" x="340" y="346" text-anchor="middle" dominant-baseline="central">liveProps — Proxy</text>
<text class="ts" x="340" y="366" text-anchor="middle" dominant-baseline="central">get(prop) → getProps()[prop]</text>
</g>
<line class="arr" x1="340" y1="382" x2="340" y2="412" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="180" y="418" width="320" height="56" rx="4"/>
<text class="th" x="340" y="438" text-anchor="middle" dominant-baseline="central">this.props.step</text>
<text class="ts" x="340" y="458" text-anchor="middle" dominant-baseline="central">в CounterVm — всегда актуально</text>
</g>
<g class="c-purple"><rect x="60" y="500" width="12" height="12" rx="2"/></g>
<text class="ts" x="80" y="506" dominant-baseline="central">в компоненте</text>
<g class="c-gray"><rect x="190" y="500" width="12" height="12" rx="2"/></g>
<text class="ts" x="210" y="506" dominant-baseline="central">в vmContext</text>
<g class="c-teal"><rect x="320" y="500" width="12" height="12" rx="2"/></g>
<text class="ts" x="340" y="506" dominant-baseline="central">в viewmodel</text>
<g class="c-red"><rect x="450" y="500" width="12" height="12" rx="2"/></g>
<text class="ts" x="470" y="506" dominant-baseline="central">антипаттерн</text>
</svg>
