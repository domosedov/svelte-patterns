<svg xmlns="http://www.w3.org/2000/svg" width="680" height="490" viewBox="0 0 680 490" role="img">
<title>Архитектура демо createVmContext</title>
<desc>Страница создаёт AppContext и передаёт его в VmProvider, провайдер кладёт его в Svelte-контекст, Counter вызывает createVm, который создаёт CounterVm с доступом к контексту.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#2c2c2a}.ts{font-size:12px;fill:#5f5e5a}.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.arr{stroke:#5f5e5a;stroke-width:1.5px;fill:none}.leader{stroke:#b4b2a9;stroke-width:.5px;stroke-dasharray:2 2;fill:none}
.c-purple>rect{fill:#eeedfe;stroke:#534ab7;stroke-width:.5px}.c-purple>.th,.c-purple>.t{fill:#3c3489}.c-purple>.ts{fill:#534ab7}
.c-teal>rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:.5px}.c-teal>.th,.c-teal>.t{fill:#085041}.c-teal>.ts{fill:#0f6e56}
.c-coral>rect{fill:#faece7;stroke:#993c1d;stroke-width:.5px}.c-coral>.th,.c-coral>.t{fill:#712b13}.c-coral>.ts{fill:#993c1d}
.c-gray>rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:.5px}.c-gray>.th,.c-gray>.t{fill:#444441}.c-gray>.ts{fill:#5f5e5a}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="490" fill="#ffffff"/>
<g class="c-purple">
<rect x="60" y="50" width="240" height="72" rx="4"/>
<text class="th" x="180" y="70" text-anchor="middle" dominant-baseline="central">+page.svelte</text>
<text class="ts" x="180" y="90" text-anchor="middle" dominant-baseline="central">const app = new AppContext()</text>
<text class="ts" x="180" y="106" text-anchor="middle" dominant-baseline="central">step = $state(1) · visible</text>
</g>
<g class="c-coral">
<rect x="400" y="50" width="220" height="72" rx="4"/>
<text class="th" x="510" y="70" text-anchor="middle" dominant-baseline="central">AppContext</text>
<text class="ts" x="510" y="90" text-anchor="middle" dominant-baseline="central">log = $state([])</text>
<text class="ts" x="510" y="106" text-anchor="middle" dominant-baseline="central">track(event)</text>
</g>
<line class="arr" x1="310" y1="86" x2="392" y2="86" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="60" y="182" width="240" height="76" rx="4"/>
<text class="th" x="180" y="202" text-anchor="middle" dominant-baseline="central">VmProvider</text>
<text class="ts" x="180" y="224" text-anchor="middle" dominant-baseline="central">set(context) при инициализации</text>
<text class="ts" x="180" y="240" text-anchor="middle" dominant-baseline="central">{@render children()}</text>
</g>
<line class="arr" x1="180" y1="122" x2="180" y2="176" marker-end="url(#arrow)"/>
<line class="arr" x1="450" y1="122" x2="290" y2="176" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
<g class="c-purple">
<rect x="60" y="318" width="240" height="72" rx="4"/>
<text class="th" x="180" y="338" text-anchor="middle" dominant-baseline="central">Counter.svelte</text>
<text class="ts" x="180" y="358" text-anchor="middle" dominant-baseline="central">props: { step }</text>
<text class="ts" x="180" y="374" text-anchor="middle" dominant-baseline="central">createVm(CounterVm, thunk)</text>
</g>
<line class="arr" x1="180" y1="258" x2="180" y2="312" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="400" y="318" width="240" height="88" rx="4"/>
<text class="th" x="520" y="338" text-anchor="middle" dominant-baseline="central">CounterVm</text>
<text class="ts" x="520" y="360" text-anchor="middle" dominant-baseline="central">$state count, $derived doubled</text>
<text class="ts" x="520" y="378" text-anchor="middle" dominant-baseline="central">$effect → context.track()</text>
</g>
<line class="arr" x1="300" y1="354" x2="392" y2="354" marker-end="url(#arrow)"/>
<line class="arr" x1="300" y1="214" x2="420" y2="310" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
<line class="arr" x1="560" y1="318" x2="560" y2="128" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="60" y="438" width="12" height="12" rx="2"/></g>
<text class="ts" x="80" y="444" dominant-baseline="central">компоненты</text>
<g class="c-teal"><rect x="180" y="438" width="12" height="12" rx="2"/></g>
<text class="ts" x="200" y="444" dominant-baseline="central">viewmodel</text>
<g class="c-coral"><rect x="300" y="438" width="12" height="12" rx="2"/></g>
<text class="ts" x="320" y="444" dominant-baseline="central">контекст</text>
<g class="c-gray"><rect x="410" y="438" width="12" height="12" rx="2"/></g>
<text class="ts" x="430" y="444" dominant-baseline="central">инфраструктура</text>
<text class="ts" x="60" y="470" dominant-baseline="central">пунктир — доставка контекста, сплошная стрелка — создание / вызов</text>
</svg>
